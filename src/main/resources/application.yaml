spring:
  profiles:
    active: local, oauth2, jwt

  messages:
    encoding: utf-8
    cache-duration: 3600
    fallback-to-system-locale: true
    basename: i18n/common/messages,
      i18n/member/messages,
      i18n/auth/messages

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

file:
  storage:
    location: uploads
    max-file-size: 104857600